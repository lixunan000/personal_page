<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e40af" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- 楠字 -->
  <text x="50" y="50" 
        font-family="Arial, sans-serif" 
        font-size="54" 
        font-weight="bold"
        fill="white" 
        text-anchor="middle"
        dominant-baseline="middle">楠</text>
  
  <!-- 科技感装饰线 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>
